    --display:"Chakra Petch",sans-serif; --mono:"IBM Plex Mono",monospace; }
  * { box-sizing:border-box; }
  body { margin:0; min-height:100vh; background:var(--bg); color:var(--ink);
    font:13px/1.5 var(--mono); padding:40px clamp(20px,5vw,70px);
    background-image:linear-gradient(var(--line) 1px,transparent 1px),

  h1 em { color:var(--accent); font-style:normal; }
  .name { color:var(--ink-dim); margin-bottom:20px; } .name b { color:var(--ink); }
  .stats { display:flex; gap:26px; margin-bottom:22px; }
  .stat .n { font-family:var(--display); font-size:22px; color:var(--accent);
    font-variant-numeric:tabular-nums; }
  .stat .l { font-size:10px; letter-spacing:.16em; text-transform:uppercase; color:var(--ink-dim); }
  .wrap { display:flex; gap:18px; align-items:flex-start; flex-wrap:wrap; }
  .board { background:#080c12; border:1px solid var(--line); border-radius:6px;
    padding:8px; overflow:auto; max-width:100%; }
  svg.layout { display:block; }
  .clabel { fill:#8698ac; font:600 8px var(--mono); }
  .fabwin { fill:#55d7f2; font:600 9px var(--mono); letter-spacing:.08em; }
  .legend { background:var(--panel); border:1px solid var(--line);
    border-radius:6px; padding:12px 16px; min-width:150px; }
  .legend h2 { font-family:var(--display); font-size:10px; letter-spacing:.2em;
    text-transform:uppercase; color:var(--ink-dim); margin:0 0 10px; }
  .lay { display:flex; align-items:center; gap:8px; padding:3px 0; font-size:11.5px; }
  .fablink { display:block; margin-top:14px; padding-top:12px; border-top:1px solid var(--line); color:var(--accent); text-decoration:none; font-size:11px; letter-spacing:.04em; }
  .fablink:hover { text-decoration:underline; }
  .sw { width:12px; height:12px; border-radius:2px; flex:none;
    box-shadow:0 0 0 1px rgba(255,255,255,.14) inset; }
