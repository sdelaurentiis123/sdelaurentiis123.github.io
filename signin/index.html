<!DOCTYPE html>
<html class="staticrypt-html">
    <head>
        <meta charset="utf-8" />
        <title>Sign in — Stan DeLaurentiis</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <style>
            .staticrypt-hr {
                margin-top: 20px;
                margin-bottom: 20px;
                border: 0;
                border-top: 1px solid #eee;
            }

            .staticrypt-page {
                width: 360px;
                padding: 8% 0 0;
                margin: auto;
                box-sizing: border-box;
            }

            .staticrypt-form {
                position: relative;
                z-index: 1;
                background: #ffffff;
                max-width: 360px;
                margin: 0 auto 100px;
                padding: 45px;
                text-align: center;
                box-shadow: 0 0 20px 0 rgba(0, 0, 0, 0.2), 0 5px 5px 0 rgba(0, 0, 0, 0.24);
            }

            .staticrypt-form input[type="password"],
            input[type="text"] {
                background: inherit;
                border: 0;
                box-sizing: border-box; /* This ensures padding is included in the total width */
                font-size: 14px;
                outline: 0;
                padding: 15px 30px 15px 15px; /* Adjust the padding to ensure there is space for the icon */
                width: 100%;
            }

            .staticrypt-password-container {
                position: relative;
                outline: 0;
                background: #f2f2f2;
                width: 100%;
                border: 0;
                margin: 0 0 15px;
                box-sizing: border-box;
            }

            .staticrypt-toggle-password-visibility {
                cursor: pointer;
                height: 20px;
                opacity: 60%;
                padding: 13px;
                position: absolute;
                right: 0;
                top: 50%;
                transform: translateY(-50%);
                width: 20px;
            }

            .staticrypt-form .staticrypt-decrypt-button {
                text-transform: uppercase;
                outline: 0;
                background: #4CAF50;
                width: 100%;
                border: 0;
                padding: 15px;
                color: #ffffff;
                font-size: 14px;
                cursor: pointer;
            }

            .staticrypt-form .staticrypt-decrypt-button:hover,
            .staticrypt-form .staticrypt-decrypt-button:active,
            .staticrypt-form .staticrypt-decrypt-button:focus {
                background: #4CAF50;
                filter: brightness(92%);
            }

            .staticrypt-html {
                height: 100%;
            }

            .staticrypt-body {
                height: 100%;
                margin: 0;
            }

            .staticrypt-content {
                height: 100%;
                margin-bottom: 1em;
                background: #76B852;
                font-family: "Arial", sans-serif;
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
            }

            .staticrypt-instructions {
                margin-top: -1em;
                margin-bottom: 1em;
            }

            .staticrypt-title {
                font-size: 1.5em;
            }

            label.staticrypt-remember {
                display: flex;
                align-items: center;
                margin-bottom: 1em;
            }

            .staticrypt-remember input[type="checkbox"] {
                transform: scale(1.5);
                margin-right: 1em;
            }

            .hidden {
                display: none !important;
            }

            .staticrypt-spinner-container {
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .staticrypt-spinner {
                display: inline-block;
                width: 2rem;
                height: 2rem;
                vertical-align: text-bottom;
                border: 0.25em solid gray;
                border-right-color: transparent;
                border-radius: 50%;
                -webkit-animation: spinner-border 0.75s linear infinite;
                animation: spinner-border 0.75s linear infinite;
                animation-duration: 0.75s;
                animation-timing-function: linear;
                animation-delay: 0s;
                animation-iteration-count: infinite;
                animation-direction: normal;
                animation-fill-mode: none;
                animation-play-state: running;
                animation-name: spinner-border;
            }

            @keyframes spinner-border {
                100% {
                    transform: rotate(360deg);
                }
            }

            @media screen and (-webkit-min-device-pixel-ratio: 0) {
                .staticrypt-form input[type="password"],
                input[type="text"] {
                    font-size: 16px;
                }
            }

            :root {
                color-scheme: light;
                --signin-background: #f7f7f5;
                --signin-surface: #ffffff;
                --signin-text: #1f2933;
                --signin-muted: #667085;
                --signin-border: #d8dee6;
                --signin-accent: #1a6dd4;
                --signin-accent-hover: #1558b0;
                --signin-error: #b42318;
                --signin-focus: rgba(26, 109, 212, 0.18);
            }

            * { box-sizing: border-box; }

            .staticrypt-body {
                min-height: 100%;
                background: var(--signin-background);
                color: var(--signin-text);
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            }

            .staticrypt-content {
                min-height: 100vh;
                height: auto;
                display: grid;
                place-items: center;
                margin: 0;
                padding: 32px 20px;
                background: var(--signin-background);
                font-family: inherit;
            }

            .staticrypt-page {
                width: 100%;
                max-width: 420px;
                padding: 0;
                margin: 0;
            }

            .staticrypt-home-link {
                display: inline-block;
                margin-bottom: 20px;
                color: var(--signin-muted);
                font-size: 14px;
                text-decoration: none;
            }

            .staticrypt-home-link:hover { color: var(--signin-accent); }

            .staticrypt-form {
                max-width: none;
                margin: 0;
                padding: 34px;
                border: 1px solid #e4e7ec;
                border-radius: 14px;
                background: var(--signin-surface);
                box-shadow: 0 14px 40px rgba(31, 41, 51, 0.08);
                text-align: left;
            }

            .staticrypt-instructions {
                margin: 0 0 28px;
            }

            .staticrypt-title {
                margin: 0 0 8px;
                font-size: 26px;
                font-weight: 650;
                letter-spacing: -0.02em;
            }

            .staticrypt-subtitle {
                margin: 0;
                color: var(--signin-muted);
                font-size: 15px;
                line-height: 1.5;
            }

            .staticrypt-field { margin-bottom: 18px; }

            .staticrypt-field label,
            .staticrypt-password-label {
                display: block;
                margin-bottom: 7px;
                color: var(--signin-text);
                font-size: 14px;
                font-weight: 600;
            }

            .staticrypt-form input[type="text"],
            .staticrypt-form input[type="password"] {
                width: 100%;
                height: 44px;
                padding: 0 12px;
                border: 1px solid var(--signin-border);
                border-radius: 8px;
                background: var(--signin-surface);
                color: var(--signin-text);
                font: inherit;
                font-size: 16px;
                outline: none;
                transition: border-color 0.15s, box-shadow 0.15s;
            }

            .staticrypt-form input:focus {
                border-color: var(--signin-accent);
                box-shadow: 0 0 0 3px var(--signin-focus);
            }

            .staticrypt-password-container {
                position: relative;
                margin: 0 0 18px;
                background: transparent;
            }

            .staticrypt-password-container input { padding-right: 44px !important; }

            .staticrypt-toggle-password-visibility {
                position: absolute;
                top: 50%;
                right: 5px;
                display: grid;
                width: 34px;
                height: 34px;
                padding: 7px;
                transform: translateY(-50%);
                border: 0;
                border-radius: 6px;
                background: transparent;
                cursor: pointer;
            }

            .staticrypt-toggle-password-visibility:hover { background: #f2f4f7; }

            .staticrypt-toggle-password-visibility:focus-visible {
                outline: 2px solid var(--signin-accent);
                outline-offset: 1px;
            }

            label.staticrypt-remember {
                display: flex;
                align-items: center;
                gap: 9px;
                margin: 2px 0 20px;
                color: var(--signin-muted);
                font-size: 14px;
                cursor: pointer;
            }

            .staticrypt-remember input[type="checkbox"] {
                width: 16px;
                height: 16px;
                margin: 0;
                transform: none;
                accent-color: var(--signin-accent);
            }

            .staticrypt-error {
                margin: -4px 0 16px;
                color: var(--signin-error);
                font-size: 14px;
                line-height: 1.4;
            }

            .staticrypt-form .staticrypt-decrypt-button {
                width: 100%;
                min-height: 44px;
                padding: 10px 16px;
                border: 0;
                border-radius: 8px;
                background: var(--signin-accent);
                color: #ffffff;
                font: inherit;
                font-size: 15px;
                font-weight: 650;
                cursor: pointer;
                transition: background 0.15s, transform 0.05s;
            }

            .staticrypt-form .staticrypt-decrypt-button:hover { background: var(--signin-accent-hover); }
            .staticrypt-form .staticrypt-decrypt-button:active { transform: translateY(1px); }

            .staticrypt-form .staticrypt-decrypt-button:focus-visible {
                outline: 3px solid var(--signin-focus);
                outline-offset: 2px;
            }

            .staticrypt-form .staticrypt-decrypt-button:disabled {
                cursor: wait;
                opacity: 0.7;
            }

            .staticrypt-spinner { border-right-color: var(--signin-accent); }

            @media (max-width: 480px) {
                .staticrypt-content {
                    align-items: start;
                    padding-top: 24px;
                }

                .staticrypt-form {
                    padding: 26px 22px;
                    border-radius: 12px;
                }
            }
        </style>
    </head>
